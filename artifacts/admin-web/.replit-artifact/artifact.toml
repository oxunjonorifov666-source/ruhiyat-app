kind = "web"
previewPath = "/admin/"
title = "Admin Web"
version = "1.0.0"
id = "artifacts/admin-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 24276

[services.development]
run = "pnpm --filter @ruhiyat/admin-web run dev"

[services.env]
PORT = "24276"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@ruhiyat/admin-web", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@ruhiyat/admin-web", "run", "start", "--", "-p", "24276"]

[services.production.run.env]
PORT = "24276"
NODE_ENV = "production"
